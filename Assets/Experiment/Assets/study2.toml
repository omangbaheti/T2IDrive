[configuration]
# order = [[OnHand-Steer, OnHand-Brake, OnHand-Obstacle, OnHand-Pedestrian],[Windshield-Steer, Windshield-Brake, Windshield-Obstacle, Windshield-Pedestrian],[TouchScreen-Steer, TouchScreen-Brake, TouchScreen-Obstacle, TouchScreen-Pedestrian],[Baseline-Steer, Baseline-Brake, Baseline-Obstacle, Baseline-Pedestrian]]
# order = [["Pedestrian", "Brake", "Obstacle", "Steer"], [["OnHand-Steer", "OnHand-Brake", "OnHand-Obstacle", "OnHand-Pedestrian"], [], [], []]]
order = ["OnHand", "Windshield","TouchScreen"]


# - "latin_square": Apply latin square to balance the values.
# - "randomize": For each participant randomize the order of the values in the array.
# - "as_is": Use the order of the values as specified.
# When not specified, the default value is "as_is" for both keys.
groups = "latin_square"
within_groups = "latin_square"

# The random seed to use for any randomization. Default seed is 0.
# The seed will be the value of random_seed + participant_index
random_seed = 0

[configuration.variables]
TRIALS_PER_ITEM = 3

# ------------------- BaseLine-------------------
[[blocks]]
name = "Baseline"
[blocks.config]
UserInterface = "Baseline"

# ------------------- OnHand -------------------
[[blocks]]
name = "OnHand"
[blocks.config]
UserInterface = "OnHand"


# ------------------- Windshield -------------------
[[blocks]]
name = "Windshield"
[blocks.config]
UserInterface = "Windshield"

# ------------------- TouchScreen -------------------
[[blocks]]
name = "TouchScreen"
[blocks.config]
UserInterface = "TouchScreen"
